application:
  name: photoview
  pods:
  - name: app
    image: mirror.gcr.io/viktorstrate/photoview:2
    path: /
    servicePorts:
    - 80
    vars:
      PHOTOVIEW_DATABASE_DRIVER: mysql
      PHOTOVIEW_MYSQL_URL: "photoview:photoview@tcp(mysql.pod:3306)/photoview"
      PHOTOVIEW_LISTEN_IP: "0.0.0.0"
      PHOTOVIEW_LISTEN_PORT: "80"
      PHOTOVIEW_MEDIA_CACHE: /app/cache
    volumes:
    - name: photoview-photos
      mountPath: /photos
      size: 20Gi
    - name: photoview-cache
      mountPath: /app/cache
      size: 5Gi
  - name: mysql
    image: mirror.gcr.io/library/mysql:8.0
    servicePorts:
    - 3306
    vars:
      MYSQL_DATABASE: photoview
      MYSQL_USER: photoview
      MYSQL_PASSWORD: photoview
      MYSQL_ROOT_PASSWORD: rootpassword
    volumes:
    - name: photoview-db
      mountPath: /var/lib/mysql
      size: 10Gi
